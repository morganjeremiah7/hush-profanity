# hush-profanity configuration
# Copy this to settings.toml and edit. settings.toml is gitignored.

[library]
# One or more root directories to scan for video files. Subdirectories are walked recursively.
# REQUIRED: edit before running. Use double backslashes on Windows ("C:\\Path\\To\\Video").
# Examples:
#   roots = ["C:\\Users\\you\\Videos"]
#   roots = ["D:\\Movies", "D:\\TV"]
#   roots = ["/home/you/videos"]   # Linux
roots = []
# File extensions to process.
extensions = [".mp4", ".mkv", ".avi", ".mov", ".m4v"]
# Skip a video if the EDL already has an auto-generated section.
# Set to false to force a re-scan of every file.
skip_if_processed = true

[whisper]
# Model size: tiny, base, small, medium, large-v2, large-v3, large-v3-turbo, distil-large-v3
# large-v3 is the most accurate; medium is a good fallback for 8-11 GB GPUs.
# The Windows installer auto-detects your GPU and writes the right value here:
#   24 GB+ → large-v3 (with gpu_workers = 2 in [performance])
#   12-23 GB → large-v3
#    8-11 GB → medium
model = "large-v3"
# Compute precision for the Whisper model. openai-whisper supports:
#   "float16" — full precision on Ampere+ GPUs (3090 etc.). Recommended.
#   "float32" — slower, more VRAM, slightly more accurate. Rarely needed.
#   "int8" / "int8_float16" — accepted but mapped to fp16; openai-whisper
#                             doesn't have true quantized inference like
#                             faster-whisper did.
compute_type = "float16"
# "cuda" for GPU, "cpu" for CPU-only.
device = "cuda"
# Specific GPU index when multiple are present.
device_index = 0
# Beam size for decoding. 5 is a good quality/speed default.
beam_size = 5
# Language hint. "en" disables language detection (faster, more accurate for English content).
language = "en"
# Kept for backwards compatibility with old settings.toml files. openai-whisper
# does not have an integrated VAD; it relies on its own no_speech_threshold
# (currently default 0.6). Value is ignored — the previous engine had Silero VAD.
vad_filter = true
# When .mkv has multiple audio tracks, prefer this language (ISO 639-1 or 639-2 code).
audio_language = "eng"

[alignment]
# WhisperX wav2vec2 forced alignment for tight (~20ms) word boundaries.
# Without this, Whisper word timestamps drift by 200-500ms — long enough to leak swears past the mute.
enabled = true

[edl]
# EDL action for profanity: 1 = mute (recommended), 0 = cut entirely.
profanity_action = 1
# Pad the mute region by this many seconds on each side. Helps catch the leading consonant /
# trailing release of the swear when alignment is slightly off.
padding_seconds = 0.10
# Merge adjacent profanity entries within this many seconds into one mute region.
merge_gap_seconds = 2.0

[subtitles]
# Generate the cleaned .srt next to the video.
generate_srt = true
# Generate a debug per-word .srt named <base>-words.srt. Useful when troubleshooting timing.
generate_words_srt = false
# Hard cap (seconds) on a single subtitle cue. Long monologues with no
# punctuation get split here for readability.
segment_max_duration = 5.0
# Finalize a cue when the gap between consecutive words exceeds this many
# seconds. Stops one cue from spanning long silences (sentence boundaries,
# speaker changes, scene cuts). Lower = more cuts, higher = subtitles linger.
max_pause_seconds = 1.5
# How long a finalized cue stays on screen after the last word ends, so the
# viewer has time to finish reading. Capped to not overlap the next cue.
tail_seconds = 0.5

[paths]
# Path to the swear word list. One word per line, lowercase. Comments start with #.
swears_file = "config/swears.txt"
# Path to the multi-word phrase list. One phrase per line, lowercase, words space-separated.
# Catches things like "oh my god" and "what the fuck" that the single-word list can't (you wouldn't
# want to add "god" alone — it would over-fire). Also catches Whisper splits like "bull shit".
phrases_file = "config/swear_phrases.txt"
# Path to the replacement-words JSON. Has both "words" and "phrases" sections.
replacements_file = "config/replacements.json"
# Where to keep per-run logs. Created on demand.
log_dir = "logs"
# Where to keep the resume checkpoint (which files have been processed).
checkpoint_file = "logs/checkpoint.json"

[webui]
# Port for the manual scene-skip web tool. http://localhost:<port>/
port = 8765
# Bind address. Leave as 127.0.0.1 unless you want to access from another device on the LAN.
host = "127.0.0.1"
# Default action for manually-marked scenes. 0 = cut (skip the segment), 1 = mute.
default_action = 0

[performance]
# Three-stage pipeline: encode (CPU) -> Whisper transcribe + align (GPU) -> post (CPU).
# All three stages run concurrently on different files for steady-state throughput.

# How many ffmpeg processes run in parallel pre-encoding the next batch of WAVs.
# Default 2 keeps the GPU fed without saturating disk I/O on a network share.
encode_workers = 2
# How many GPU worker threads run concurrently. Each one spawns a fresh
# subprocess per file (model loaded inside the subprocess). 1 = serial; 2 =
# two files transcribed at once on the same GPU (~1.5-1.8x faster on a 24GB
# card; needs ~14-22 GB peak depending on compute_type). Higher rarely helps.
# If you OOM, drop to 1 OR switch compute_type to int8_float16 to save VRAM.
gpu_workers = 1
# How many threads write EDL/SRT files in parallel after Whisper finishes.
# These are CPU+I/O light; 2 is plenty.
post_workers = 2
# Kept for backwards compatibility with old settings.toml files. openai-whisper
# does not expose a batch-size knob (the engine processes the whole file in one
# call internally). Value is ignored. Was meaningful when the engine was
# faster-whisper / ctranslate2.
whisper_batch_size = 1
