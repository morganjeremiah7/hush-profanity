<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ video_name }} — hush-profanity</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body data-video-path="{{ video_path }}" data-default-action="{{ default_action }}">
<header>
    <a href="/" class="back">&larr; library</a>
    <h1>{{ video_name }}</h1>
</header>

<main class="watch">
    <video id="player" controls preload="metadata">
        <source src="/stream?path={{ video_path | urlencode }}">
    </video>

    <section class="controls">
        <div class="hud">
            <span>time: <output id="now">00:00:00.000</output></span>
            <span>in:   <output id="mark-in">—</output></span>
            <span>out:  <output id="mark-out">—</output></span>
        </div>
        <div class="buttons">
            <button id="btn-in"     title="Set in point at current time (key: I)">Set IN (I)</button>
            <button id="btn-out"    title="Set out point at current time (key: O)">Set OUT (O)</button>
            <button id="btn-add"    title="Append the current in/out as a manual entry (key: Enter)">Add entry (↵)</button>
            <button id="btn-clear"  title="Clear in/out without saving">Clear (Esc)</button>
            <label>
                action:
                <select id="action">
                    <option value="0">0 — cut (skip)</option>
                    <option value="1">1 — mute</option>
                </select>
            </label>
            <button id="btn-save" class="primary">Save EDL</button>
        </div>
        <p class="hint">Keys: <kbd>J</kbd>/<kbd>L</kbd> = back/forward 5s · <kbd>,</kbd>/<kbd>.</kbd> = frame ±0.1s · <kbd>Space</kbd> = play/pause</p>
    </section>

    <section class="entries">
        <h2>Manual entries <small id="manual-count">(0)</small></h2>
        <table id="manual">
            <thead><tr><th>start</th><th>end</th><th>dur</th><th>action</th><th>comment</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <h2>Auto profanity entries <small id="auto-count">(0)</small> <span class="muted">(read-only — regenerated by scan)</span></h2>
        <table id="auto">
            <thead><tr><th>start</th><th>end</th><th>action</th><th>comment</th></tr></thead>
            <tbody></tbody>
        </table>
    </section>
</main>

<script src="/static/watch.js"></script>
</body>
</html>
